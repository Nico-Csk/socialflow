services:
  postgres:
    image: postgres:16-alpine
    container_name: socialflow-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: socialflow
      POSTGRES_PASSWORD: socialflow
      POSTGRES_DB: socialflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
